<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noway</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="landing-page" id="landingPage">

    <!-- Computer image wrapper — keeps overlay aligned to the image -->
    <div class="computer-container" id="computerContainer">
      <img src="IMAGES/Logo on Screen 1.png" alt="Noway Computer" class="landing-bg" id="computerImg">
      <!-- Start button inside the screen area -->
      <div class="screen-overlay" id="screenOverlay">
        <button class="start-btn" id="startBtn">&#9654; START</button>
      </div>
    </div>

    <!-- Hint text below the computer -->
    <p class="hint-text" id="hintText">&#9654; Click the button</p>

  </div>

  <!-- Boot Sequence Overlay -->
  <div class="boot-overlay" id="bootOverlay">
    <div class="boot-text" id="bootText"></div>
    <div class="boot-progress-bar">
      <div class="fill" id="bootFill"></div>
    </div>
  </div>

  <!-- Page Transition -->
  <div class="page-transition" id="pageTransition"></div>

  <script src="script.js"></script>
</body>
</html>
